<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#003399" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>EU연합 통합시스템</title>
  <link rel="stylesheet" href="styles.css?v=10" />
  <link rel="stylesheet" href="landing.css?v=10" />
</head>
<body class="landing-body">
  <header class="landing-hero">
    <div class="eu-flag-bar large" aria-label="EU 연합 깃발">
      <svg class="eu-flag-svg large" viewBox="0 0 90 60" aria-hidden="true">
        <rect width="90" height="60" fill="#003399"/>
        <g fill="#FFCC00">
          <g transform="translate(45,30) rotate(0) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(30) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(60) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(90) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(120) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(150) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(180) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(210) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(240) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(270) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(300) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
          <g transform="translate(45,30) rotate(330) translate(0,-15)"><polygon points="0,-3.5 0.82,-1.08 3.33,-1.08 1.31,0.41 2.06,2.83 0,1.35 -2.06,2.83 -1.31,0.41 -3.33,-1.08 -0.82,-1.08"/></g>
        </g>
      </svg>
    </div>
    <h1 class="hero-title">EU 연합 통합시스템</h1>
    <p class="hero-sub">바람의나라 클래식 · 공성 점수 인증 · 통계 대시보드</p>
    <div class="today-banner" id="todayBanner">
      <span id="todayLabel">오늘은 ...</span>
      <span class="castle-tag" id="castleTag">...</span>
    </div>
  </header>

  <main class="landing-main">
    <section class="card stats-banner" id="statsBanner">
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-num" id="statSubmitted">-</div>
          <div class="stat-lbl">이번주 신청</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-num" id="statTotal">-</div>
          <div class="stat-lbl">총 문원</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-num" id="statPct">-</div>
          <div class="stat-lbl">진행률</div>
        </div>
      </div>
      <div class="progress-bar small"><div class="progress-fill" id="statFill"></div></div>
    </section>

    <section class="select-prompt">
      <h2>문파를 선택해 주세요</h2>
      <p class="hint">계를 누르면 소속 문파가 표시됩니다.</p>
    </section>

    <div class="family-grid" id="familyGrid"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-line">신청 가능: 월~목 00:00 ~ 23:30 (KST)</div>
    <div class="footer-line footer-powered">
      <span class="eu-stars-mini" aria-hidden="true">★ ★ ★</span>
      Powered by <strong>주술사연합회</strong>
      <span class="eu-stars-mini" aria-hidden="true">★ ★ ★</span>
    </div>
    <div class="footer-line footer-admin">
      <a href="admin.html">⚙️ 관리자</a>
    </div>
  </footer>

  <script src="landing.js?v=10"></script>
</body>
</html>
