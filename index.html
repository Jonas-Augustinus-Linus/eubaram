<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주스터콜 공성신청</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
</head>
<body>
  <header>
    <h1>⚔️ 주스터콜 공성신청</h1>
    <div class="today-banner" id="todayBanner">
      <span id="todayLabel">오늘은 ...</span>
      <span class="castle-tag" id="castleTag">...</span>
    </div>
  </header>

  <main>
    <section class="card" id="formCard">
      <h2>점수 인증</h2>

      <label class="field">
        <span>닉네임</span>
        <input type="text" id="nickname" placeholder="예: 힐킵/진선" maxlength="40" autocomplete="off" />
      </label>

      <div class="field">
        <span>점수 스크린샷</span>
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept="image/*" hidden />
          <p>이미지를 끌어다 놓거나 <button type="button" class="link-btn" id="pickBtn">파일 선택</button></p>
          <img id="preview" alt="미리보기" hidden />
        </div>
      </div>

      <div class="field ocr-status" id="ocrStatus" hidden>
        <span class="spinner"></span>
        <span id="ocrStatusText">이미지에서 점수를 읽고 있어요…</span>
      </div>

      <div class="field" id="candidatesField" hidden>
        <span>인식된 후보 점수 (선택하거나 직접 입력)</span>
        <div class="candidates" id="candidates"></div>
      </div>

      <label class="field">
        <span>점수</span>
        <input type="text" id="score" placeholder="예: 2818.23" inputmode="decimal" />
      </label>

      <label class="field">
        <span>비고 / 메모 (선택)</span>
        <input type="text" id="note" placeholder="예: 4차승급, 매화 등" maxlength="80" />
      </label>

      <button type="button" class="primary" id="submitBtn">신청하기</button>

      <p class="hint" id="formMessage"></p>
    </section>

    <section class="card">
      <div class="list-header">
        <h2 id="listTitle">오늘 신청 목록</h2>
        <div class="filter-bar">
          <select id="castleFilter">
            <option value="today">오늘 (자동)</option>
            <option value="주작성">월 · 주작성</option>
            <option value="현무성">화 · 현무성</option>
            <option value="청룡성">수 · 청룡성</option>
            <option value="백호성">목 · 백호성</option>
            <option value="all">전체</option>
          </select>
          <button type="button" class="ghost" id="refreshBtn">새로고침</button>
        </div>
      </div>

      <div class="table-wrap">
        <table id="entriesTable">
          <thead>
            <tr>
              <th>성</th>
              <th>닉네임</th>
              <th>점수</th>
              <th>시간</th>
              <th>비고</th>
            </tr>
          </thead>
          <tbody id="entriesTbody">
            <tr><td colspan="5" class="empty">불러오는 중…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="confirmDialog" class="dialog">
    <form method="dialog">
      <h3>점수갱신을 하신겁니까?</h3>
      <p id="confirmDetail"></p>
      <menu>
        <button value="cancel" class="ghost">아니요</button>
        <button value="confirm" class="primary" id="confirmYes">예, 갱신합니다</button>
      </menu>
    </form>
  </dialog>

  <dialog id="configDialog" class="dialog">
    <form method="dialog">
      <h3>Apps Script 엔드포인트 설정</h3>
      <p class="hint">최초 1회만 입력하시면 됩니다. Apps Script를 웹앱으로 배포한 뒤 받은 URL을 붙여넣어 주세요.</p>
      <input type="url" id="endpointInput" placeholder="https://script.google.com/macros/s/.../exec" required />
      <menu>
        <button value="cancel" class="ghost" type="button" id="configCancel">취소</button>
        <button value="save" class="primary" id="configSave">저장</button>
      </menu>
    </form>
  </dialog>

  <footer>
    <small>
      <a href="#" id="openConfig">엔드포인트 설정</a>
      · 공성 신청 가능 시간: 매일 00:00 ~ 23:30 (KST)
    </small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
